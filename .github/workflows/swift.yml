# This workflow will build a Swift project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-swift

name: Swift

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-26

    steps:
    - uses: actions/checkout@v6
    - name: Show Swift version
      run: swift --version
    - name: Build
      run: swift build -v
    - name: Run tests
      run: swift test -v

  release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: macos-26
    concurrency:
      group: release-main
      cancel-in-progress: false
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Compute next release tag
      id: version
      run: echo "tag=$(bash scripts/next_release_tag.sh)" >> "$GITHUB_OUTPUT"
    - name: Build release binary
      id: package
      run: |
        swift build -c release --product observer
        BIN_PATH="$(swift build -c release --show-bin-path)"
        ARCH="$(uname -m)"
        STAGING_DIR="observer-${{ steps.version.outputs.tag }}-macos-${ARCH}"
        ARTIFACT="${STAGING_DIR}.zip"
        mkdir -p "${STAGING_DIR}"
        cp "${BIN_PATH}/observer" "${STAGING_DIR}/observer"
        printf '%s\n' "${{ steps.version.outputs.tag }}" > "${STAGING_DIR}/observer.version"
        ditto -c -k --sequesterRsrc --keepParent "${STAGING_DIR}" "${ARTIFACT}"
        echo "artifact=${ARTIFACT}" >> "$GITHUB_OUTPUT"
    - name: Create GitHub release
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        gh release create "${{ steps.version.outputs.tag }}" "${{ steps.package.outputs.artifact }}" \
          --title "${{ steps.version.outputs.tag }}" \
          --target "${GITHUB_SHA}" \
          --generate-notes
